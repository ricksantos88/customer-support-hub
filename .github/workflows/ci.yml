name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Sync dependencies
        run: go mod tidy

      - name: Lint
        run: |
          gofmt -l ./cmd ./internal | tee /tmp/gofmt.out
          test ! -s /tmp/gofmt.out
          go vet ./...

      - name: Test
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET != '' && secrets.JWT_SECRET || 'ci-test-secret' }}
        run: go test ./...

      - name: Build
        run: go build ./cmd/api

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-test-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t customer-support-hub:ci .
